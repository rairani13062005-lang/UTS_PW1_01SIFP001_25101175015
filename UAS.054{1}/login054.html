<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Café Senja</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Café<span>Senja</span></div>
        <nav>
            <ul>
                <li><a href="beranda.html">Beranda</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="transaksi.html">Transaksi</a></li>
                <li><a href="login.html" class="active">Login</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section>
            <h2>Login Pelanggan</h2>
            <div class="card">
                <form id="loginForm">
                    <label for="username">Username:</label>
                    <input type="text" id="username" placeholder="Masukkan nama pengguna" required>

                    <label for="password">Password:</label>
                    <input type="password" id="password" placeholder="Masukkan kata sandi" required>

                    <button type="submit">Masuk</button>
                </form>
            </div>
        </section>
    </main>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function (e) {
            e.preventDefault(); // Mencegah form reload halaman otomatis
            
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;

            // Validasi tambahan lewat JavaScript
            if (username === "") {
                alert("Username tidak boleh kosong!");
                return;
            }

            if (password === "") {
                alert("Password wajib diisi dan tidak boleh kosong!");
                return;
            }

            // Jika semua validasi lolos
            alert(`Selamat datang kembali, ${username}!`);
            
            // Opsional: kosongkan input setelah berhasil login
            document.getElementById("loginForm").reset();
        });
    </script>
</body>
</html>
